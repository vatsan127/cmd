site_name: Command Reference
site_description: A personal DevOps/engineering cheat sheet — setup guides and command references for Docker, Git, Kubernetes, Kafka, Linux.
site_url: https://vatsan127.github.io/cmd/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

nav:
  - Home: index.md
  - Setup:
      - "Server Setup": setup/server.md
      - "Kafka (Confluent, KRaft)": setup/kafka.md
  - Commands:
      - Linux: commands/linux.md
      - Git: commands/git.md
      - Docker: commands/docker.md
      - Kubernetes: commands/kubernetes.md
      - Kafka: commands/kafka.md
